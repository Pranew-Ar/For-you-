<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    <style>
        /* Base Layout */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* PAGE 1 BACKGROUND: Moody, Rainy Castle Landscape */
            background: linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.45)), 
                        url('https://images.imagesverse.com/wp-content/uploads/2024/02/Rainy-Castle-Background.jpg') no-repeat center center/cover,
                        linear-gradient(135deg, #2c3e50, #1a252f); /* Ultra-safe ultimate dark color fallback */
            
            transition: background 2s ease-in-out;
            overflow: hidden;
            position: relative;
        }

        /* Interactive Floating Hearts Container */
        .heart-sticker {
            position: absolute;
            color: #ff4757;
            font-size: 24px;
            pointer-events: none;
            z-index: 2;
            animation: floatUp 4s linear infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0.5);
                opacity: 0;
            }
            15% { opacity: 0.7; }
            90% { opacity: 0.4; }
            100% {
                transform: translateY(-10vh) scale(1.2) translateX(50px);
                opacity: 0;
            }
        }

        /* Main Proposal Container */
        .container {
            text-align: center;
            position: relative;
            z-index: 10;
            padding: 40px;
            background-color: rgba(255, 245, 245, 0.95); 
            border-radius: 20px;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.3);
            width: 85%;
            max-width: 420px;
            height: 280px;
            backdrop-filter: blur(5px);
            box-sizing: border-box;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 12px;
            font-style: italic;
        }

        h1 {
            font-size: 2.2rem;
            color: #d63031;
            margin-top: 0;
            margin-bottom: 30px;
        }

        .btn-container {
            position: relative;
            width: 100%;
            height: 120px;
        }

        button {
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.2s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }

        #yesBtn {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            position: absolute;
            left: 15%;
            top: 20px;
            z-index: 20;
        }

        #yesBtn:hover {
            transform: scale(1.15);
            box-shadow: 0 8px 20px rgba(46, 204, 113, 0.4);
        }

        #noBtn {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            position: absolute;
            left: 55%; 
            top: 20px;
            z-index: 20;
            transition: left 0.15s ease, top 0.15s ease;
        }

        /* Custom Sweet Popup Modal */
        .popup-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.7);
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            z-index: 100;
            text-align: center;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 320px;
            width: 85%;
        }

        .popup-modal.active {
            display: block;
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .popup-modal h3 {
            margin-top: 0;
            color: #d63031;
            font-size: 1.8rem;
        }

        .popup-modal p {
            color: #34495e;
            font-size: 1.1rem;
            line-height: 1.5;
        }

        .popup-btn {
            background: #d63031;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }

        /* Page 2 Text Styling (Poem Screen) */
        .message-screen {
            display: none;
            opacity: 0;
            transition: opacity 2s ease;
            max-width: 600px;
            width: 90%;
            margin: 0 auto;
            padding: 35px;
            background-color: rgba(11, 10, 18, 0.9); 
            border-radius: 20px;
            text-align: center;
            z-index: 10;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(241, 196, 15, 0.2);
            max-height: 85vh;
            overflow-y: auto;
        }

        .message-screen h2 {
            font-size: 2.5rem;
            color: #f1c40f; 
            margin-bottom: 25px;
            font-style: italic;
            text-shadow: 0 2px 12px rgba(241, 196, 15, 0.4);
        }

        .message-screen p {
            font-size: 1.15rem;
            color: #f5f6fa;
            line-height: 1.8;
            letter-spacing: 0.6px;
            white-space: pre-line;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.7);
        }

        /* PAGE 2 BACKGROUND STYLE: Starry Mountain Night Sky Landscape */

            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), 
                        url('https://images.hdqwalls.com/download/starry-night-at-mountains-lake-4k-xo-1920x1080.jpg') no-repeat center center/cover,
                        linear-gradient(135deg, #0f2027, #203a43
