<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.25)), url('castle.png') no-repeat center center/cover;
            overflow: hidden;
            position: relative;
            touch-action: manipulation;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 25vh;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.3) 0%, rgba(0, 0, 0, 0) 100%);
            z-index: 0;
            pointer-events: none;
        }

        .heart-sticker {
            position: absolute;
            color: #ff4757;
            font-size: 22px;
            pointer-events: none;
            z-index: 5;
            animation: floatUp 4s linear infinite;
            opacity: 0;
            will-change: transform, opacity;
            transform: translateZ(0);
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0.6) translateZ(0); opacity: 0; }
            15% { opacity: 0.8; }
            80% { opacity: 0.5; }
            100% { transform: translateY(-10vh) scale(1.1) translateX(30px) translateZ(0); opacity: 0; }
        }

        /* ---------------------------------
           GENTLE & TRANSLUCENT MIST
           --------------------------------- */
        .fog-particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 2;
            will-change: transform, opacity;
            /* Drastically reduced opacity so the background shows through clearly */
            background: radial-gradient(circle, rgba(255, 255, 255, 0.35) 0%, rgba(255, 255, 255, 0.15) 50%, transparent 80%);
            filter: blur(25px);
            animation: driftFog linear infinite;
        }

        @keyframes driftFog {
            0% { transform: translate(-40vw, 0vh) scale(0.9); opacity: 0; }
            15% { opacity: 0.45; } /* Max opacity is now much lower */
            85% { opacity: 0.45; }
            100% { transform: translate(125vw, -10vh) scale(2.0); opacity: 0; }
        }

        /* Container Cards */
        .container {
            text-align: center;
            position: relative;
            z-index: 10;
            padding: 35px 20px;
            background-image: linear-gradient(rgba(0, 0, 0, 0.25), rgba(0, 0, 0, 0.3)), url('vintage-room.png') !important;
            background-repeat: no-repeat !important;
            background-position: center center !important;
            background-size: cover !important;
            background-color: rgba(20, 15, 10, 0.85); 
            border: none; 
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            width: 88%;
            max-width: 420px;
            box-sizing: border-box;
            will-change: opacity;
        }

        .subtitle, h1, .interactive-area {
            position: relative;
            z-index: 15;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #ffffff; 
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            font-weight: bold;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.9);
        }

        h1 {
            font-size: 1.9rem;
            color: #ffffff; 
            margin-top: 0;
            margin-bottom: 25px;
            line-height: 1.35;
            font-style: italic;
            font-weight: normal;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.95);
        }

        .interactive-area {
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            margin-top: 15px;
            width: 100%;
            height: 110px;
            position: relative;
        }

        .column-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 45%;
            gap: 10px;
        }

        .deco-icon {
            font-size: 1.8rem;
            opacity: 0.95;
            height: 30px;
        }

        button {
            padding: 10px 26px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Georgia', serif;
            letter-spacing: 2px;
            outline: none;
            background: rgba(0, 0, 0, 0.75);
            border-radius: 25px; 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6); 
            transition: transform 0.15s ease, background 0.2s ease;
            -webkit-tap-highlight-color: transparent;
            will-change: transform, left, top;
        }

        #yesBtn {
            color: #a8ffa8; 
            border: 2px solid rgba(140, 230, 140, 0.7);
            text-shadow: 0 0 8px rgba(140, 230, 140, 0.8);
        }
        
        #yesBtn:active {
            transform: scale(1.08);
            background: rgba(140, 230, 140, 0.25);
        }

        #noBtn {
            color: #ff8c8c; 
            border: 2px solid rgba(255, 107, 107, 0.7);
            text-shadow: 0 0 8px rgba(255, 107, 107, 0.8);
            position: absolute;
            transition: left 0.1s linear, top 0.1s linear;
            z-index: 20;
        }

        /* Book Modal Display */
        .popup-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            width: 90vw;
            max-width: 750px;
            height: 55vh;
            max-height: 420px;
            
            background-image: url('vintage-book.png') !important;
            background-repeat: no-repeat !important;
            background-position: center center !important;
            background-size: 100% 100% !important; 
            background-color: transparent !important; 
            
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            box-sizing: border-box;
            will-change: transform, opacity;
        }

        .popup-modal.active {
            display: block;
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .book-right-page {
            position: absolute;
            top: 10%;
            left: 52%; 
            width: 42%; 
            height: 80%;
            
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-sizing: border-box;
            padding: 0 8px; 
            background: transparent !important;
            overflow-y: auto;
        }

        .popup-modal h3 {
            margin: 0 0 6px 0;
            color: #2b1a0e; 
            font-size: 1.4rem;
            font-family: 'Great Vibes', cursive;
            font-weight: normal;
        }

        .popup-modal p {
            color: #3b281b; 
            font-size: 0.9rem; 
            line-height: 1.25;
            margin: 0 0 12px 0;
            font-family: 'Great Vibes', cursive;
            word-wrap: break-word; 
        }

        .popup-modal .popup-btn {
            background: #2b1a0e; 
            color: #fdfaf4;
            border: 1px solid #2b1a0e;
            padding: 5px 18px;
            border-radius: 3px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            font-family: 'Great Vibes', cursive;
        }

        /* Message Screen */
        .message-screen {
            display: none;
            opacity: 0;
            transition: opacity 0.8s ease;
            max-width: 600px;
            width: 88%;
            margin: 0 auto;
            padding: 25px 20px;
            background: rgba(15, 20, 25, 0.88) url('cloudy.png') no-repeat center center/cover; 
            border-radius: 10px;
            text-align: center;
            z-index: 10;
            border: none;
            max-height: 82vh;
            overflow-y: auto;
            box-sizing: border-box;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            will-change: opacity;
        }

        .message-screen h2 {
            font-size: 2.5rem;
            color: #ffffff;
            font-family: 'Great Vibes', cursive;
            font-weight: normal;
            margin-top: 0;
            margin-bottom: 15px;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.8);
        }

        .message-screen p {
            font-size: 1rem;
            color: #f5f2eb;
            line-height: 1.6;
            letter-spacing: 0.5px;
            white-space: pre-wrap;
            display: block;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.9);
            border: none;
            outline: none;
            user-select: none;
        }

        #loveVideo { display: none; }

        body.vintage-love {
            background: linear-gradient(rgba(0, 0, 0, 0.35), rgba(0, 0, 0, 0.5)), url('lake.jpg') no-repeat center center/cover;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.5rem; }
            .popup-modal { width: 94vw; height: 48vh; }
            .popup-modal h3 { font-size: 1.15rem; }
            .popup-modal p { font-size: 0.82rem; }
            .message-screen h2 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <audio id="romanticSong" loop preload="metadata">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <video id="loveVideo" preload="metadata" playsinline webkit-playsinline muted>
        <source src="video.mp4" type="video/mp4">
    </video>

    <div class="container" id="proposalStage">
        <div class="subtitle">I Love You...!</div>
        <h1 id="questionText">Will you be my Forever?</h1>
        
        <div class="interactive-area" id="btnArea">
            <div class="column-box">
                <span class="deco-icon">🌹</span>
                <button id="yesBtn">YES</button>
            </div>
            <div class="column-box" id="noColumn">
                <span class="deco-icon">🌿</span>
                <button id="noBtn" onmouseover="moveNoButton(event)" ontouchstart="moveNoButton(event)">NO</button>
            </div>
        </div>
    </div>

    <div class="popup-modal" id="lovePopup">
        <div class="book-right-page">
            <h3>I Found You... ❤️</h3>
            <p>I knew it the second I saw you. Even if we were born in different worlds, or separated by a thousand skies... my heart would still recognize yours. This letter is everything I've been wanting to say to you.</p>
            <button class="popup-btn" onclick="acceptProposal()">Read it ✨</button>
        </div>
    </div>

    <div class="message-screen" id="successStage">
        <h2>Forever & Always</h2>
        <p id="typewriterText"></p>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const btnArea = document.getElementById('btnArea');
        const proposalStage = document.getElementById('proposalStage');
        const successStage = document.getElementById('successStage');
        const lovePopup = document.getElementById('lovePopup');
        const song = document.getElementById('romanticSong');
        const video = document.getElementById('loveVideo');
        const textDisplay = document.getElementById('typewriterText');

        let musicStarted = false;
        let isFirstMove = true;
        let currentActiveVideo = 1;

        function initNoButtonPosition() {
            const rect = noBtn.getBoundingClientRect();
            const areaRect = btnArea.getBoundingClientRect();
            noBtn.style.left = (rect.left - areaRect.left) + 'px';
            noBtn.style.top = (rect.top - areaRect.top) + 'px';
        }

        const timelineVideo1 = [
            { time: 0.0, text: "Allow me to love you at your worst" },
            { time: 2.5, text: "When the world caves in upon your shoulders" },
            { time: 5.5, text: "And the universe steals the breath from your lungs" },
            { time: 9.5, text: "When the nights grow heavier than your hope" },
            { time: 12.8, text: "And even your own name feels unfamiliar" },
            { time: 15.8, text: "Let me be the place you fall without fear" },
            { time: 19.8, text: "I will stand between you and destruction" },
            { time: 23.3, text: "Take the impact meant for your heart" },
            { time: 26.0, text: "And spend pieces of my own" },
            { time: 28.5, text: "If it means you can endure a moment longer" },
            { time: 31.8, text: "If loving you requires sacrifice\nLet it be mine" },
            { time: 37.5, text: "If surviving costs me everything\nLet it be willingly given" },
            { time: 43.8, text: "For loving you especially at your weakest\nIs the only strength I will ever need" }
        ];

        const timelineVideo2 = [
            { time: 0.0, text: "This is my promise to you" },
            { time: 2.2, text: "I am not with you for the short term" },
            { time: 5.2, text: "I'm not here to waste your time" },
            { time: 7.8, text: "I'm here to build a life" },
            { time: 9.8, text: "A future and a story with you" },
            { time: 12.8, text: "I want to spend the rest of my life waking up next to you" },
            { time: 16.8, text: "I'm in it for the long haul" },
            { time: 19.2, text: "I'm not going anywhere without my best friend by my side I love you , I will always love you in every life in every world, I belong to you my soul my heart my breath it all belongs to you only you my love" }
        ];

        const fullLetterText = `Allow me to love you at your worst\nWhen the world caves in upon your shoulders\nAnd the universe steals the breath from your lungs\n\nWhen the nights grow heavier than your hope\nAnd even your own name feels unfamiliar\nLet me be the place you fall without fear\n\nI will stand between you and destruction\nTake the impact meant for your heart\nAnd spend pieces of my own\nIf it means you can endure a moment longer\n\nIf loving you requires sacrifice, let it be mine.\nIf surviving costs me everything, let it be willingly given.\nFor loving you especially at your weakest, is the only strength I will ever need.\n\n***\n\nThis is my promise to you:\nI am not with you for the short term.\nI'm not here to waste your time.\nI'm here to build a life, a future, and a story with you.\nI want to spend the rest of my life waking up next to you.\nI'm in it for the long haul.\nI'm not going anywhere without my best friend by my side I love you , I will always love you in every life in every world, I belong to you my soul my heart my breath it all belongs to you only you my love.`;

        function triggerMusic() {
            if (!musicStarted && song) {
                song.play().then(() => { musicStarted = true; }).catch(() => {});
            }
        }

        setInterval(() => {
            const heart = document.createElement('div');
            heart.classList.add('heart-sticker');
            heart.innerHTML = ['❤️','💖','✨','🌸'][Math.floor(Math.random() * 4)];
            heart.style.left = Math.random() * 95 + "vw";
            heart.style.animationDuration = (Math.random() * 2 + 3.5) + "s";
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 3800);
        }, 1200);

        /* Soft & Sparse Fog Engine */
        function createFogCloud(isInitialLoad = false) {
            const fog = document.createElement('div');
            fog.classList.add('fog-particle');
            
            // Moderate Cloud Dimensions
            const width = Math.random() * 300 + 300; 
            fog.style.width = width + 'px';
            fog.style.height = (width * 0.6) + 'px'; 
            
            fog.style.left = "-40vw"; 
            fog.style.top = (Math.random() * 85 - 10) + "vh";

            // Ultra-slow speed maintained (60s - 100s)
            const animDuration = Math.random() * 40 + 60; 
            fog.style.animationDuration = animDuration + "s"; 
            
            if (isInitialLoad) {
                const randomDelay = Math.random() * animDuration; 
                fog.style.animationDelay = "-" + randomDelay + "s";
            }
            
            document.body.appendChild(fog);
            setTimeout(() => { fog.remove(); }, (animDuration * 1000) + 500);
        }

        // Spawn only 8 delicate clouds so the castle image is completely visible
        for (let i = 0; i < 8; i++) {
            createFogCloud(true);
        }

        // Slowed down the spawning interval to prevent thick build-up
        setInterval(() => {
            createFogCloud(false); 
        }, 6000); 

        function moveNoButton(e) {
            if (e && e.type === 'touchstart') {
                e.preventDefault(); 
            }
            triggerMusic(); 
            if (isFirstMove) {
                initNoButtonPosition();
                isFirstMove = false;
            }
            const areaWidth = btnArea.clientWidth;
            const areaHeight = btnArea.clientHeight;
            const maxX = areaWidth - noBtn.offsetWidth;
            const maxY = areaHeight - noBtn.offsetHeight;

            noBtn.style.left = (maxX > 0 ? Math.floor(Math.random() * maxX) : 5) + 'px';
            noBtn.style.top = (maxY > 0 ? Math.floor(Math.random() * maxY) : 5) + 'px';
        }

        document.getElementById('yesBtn').addEventListener('click', () => {
            triggerMusic();
            if (lovePopup) lovePopup.classList.add('active');
        });

        function acceptProposal() {
            if (song) { song.pause(); song.currentTime = 0; }
            if (lovePopup) lovePopup.classList.remove('active');
            
            proposalStage.style.transition = 'opacity 0.3s ease';
            proposalStage.style.opacity = '0';

            setTimeout(() => {
                proposalStage.style.display = 'none';
                document.body.className = 'vintage-love'; 

                // Reset and maintain matching 8 cloud density for Stage 2 (Lake BG)
                document.querySelectorAll('.fog-particle').forEach(c => c.remove());
                for (let i = 0; i < 8; i++) {
                    createFogCloud(true);
                }

                successStage.style.display = 'block';
                setTimeout(() => {
                    successStage.style.opacity = '1';
                    if (video) {
                        video.muted = false;
                        video.play().catch(() => {
                            textDisplay.textContent = fullLetterText;
                        });
                        video.addEventListener('timeupdate', handleTimelineTracking);
                        video.addEventListener('ended', handleVideoEndEvent);
                    }
                }, 50);
            }, 300);
        }

        function handleTimelineTracking() {
            const currentTime = video.currentTime;
            let currentLine = "";
            if (currentActiveVideo === 1) {
                for (let i = 0; i < timelineVideo1.length; i++) {
                    if (currentTime >= timelineVideo1[i].time) currentLine = timelineVideo1[i].text;
                }
            } else if (currentActiveVideo === 2) {
                for (let i = 0; i < timelineVideo2.length; i++) {
                    if (currentTime >= timelineVideo2[i].time) currentLine = timelineVideo2[i].text;
                }
            }
            if (textDisplay.textContent !== currentLine && currentActiveVideo !== 0) {
                textDisplay.textContent = currentLine;
            }
        }

        function handleVideoEndEvent() {
            if (currentActiveVideo === 1) {
                currentActiveVideo = 2;
                video.src = "video2.mp4"; 
                video.load();
                video.play().catch(() => {});
            } else if (currentActiveVideo === 2) {
                currentActiveVideo = 0; 
                textDisplay.textContent = fullLetterText;
            }
        }
    </script>
</body>
</html>
