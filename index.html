<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    <style>
        /* Base Layout */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            background-color: #0a060c;
        }

        /* FIXED: Added explicit dimensions and positioning anchors so the background image renders */
        body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('castle.jpg') no-repeat center bottom;
            background-size: cover; /* Fills width completely to hide gray side bars */
            z-index: 1;
            transition: background 2s ease-in-out;
        }

        /* Page 2 Active Background State */
        body.vintage-love::after {
            background: linear-gradient(rgba(255, 255, 255, 0.02), rgba(0, 0, 0, 0.15)), 
                        url('lake.jpg') no-repeat center center;
            background-size: cover;
            animation: starTwinkle 5s ease-in-out infinite alternate;
        }

        /* Overlay Layer for Vignette and Ambient Gradient Hearts */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(255, 71, 87, 0.04) 1px, transparent 1px),
                        radial-gradient(circle at 75% 60%, rgba(255, 107, 129, 0.06) 2px, transparent 2px),
                        rgba(0, 0, 0, 0.2);
            z-index: 2;
            pointer-events: none;
        }

        /* Interactive Floating Hearts Container */
        .heart-sticker {
            position: absolute;
            color: #ff4757;
            font-size: 24px;
            pointer-events: none;
            z-index: 3;
            animation: floatUp 4s linear infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0.5);
                opacity: 0;
            }
            15% { opacity: 0.7; }
            90% { opacity: 0.4; }
            100% {
                transform: translateY(-10vh) scale(1.2) translateX(50px);
                opacity: 0;
            }
        }

        /* Main Proposal Container */
        .container {
            text-align: center;
            position: relative;
            z-index: 10;
            padding: 40px;
            background-color: rgba(255, 245, 245, 0.9); 
            border-radius: 20px;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.2);
            width: 85%;
            max-width: 420px;
            height: 280px;
            backdrop-filter: blur(5px);
            box-sizing: border-box;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 12px;
            font-style: italic;
        }

        h1 {
            font-size: 2.2rem;
            color: #d63031;
            margin-top: 0;
            margin-bottom: 30px;
        }

        .btn-container {
            position: relative;
            width: 100%;
            height: 120px;
        }

        button {
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.2s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }

        #yesBtn {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            position: absolute;
            left: 15%;
            top: 20px;
            z-index: 20;
        }

        #yesBtn:hover {
            transform: scale(1.15);
            box-shadow: 0 8px 20px rgba(46, 204, 113, 0.4);
        }

        #noBtn {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            position: absolute;
            left: 55%; 
            top: 20px;
            z-index: 20;
            transition: left 0.15s ease, top 0.15s ease;
        }
